<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="icon"
      href="resources/favicon.ico"
      type="image/x-icon"
      sizes="96x96"
    />
    <title>Business Blog Card</title>
  </head>
  <body class="bg-[#F2F5F9] font-[lato] text-[16px]">
    <div class="max-w-7xl mx-auto">
      <div
        class="sm:px-6 lg:px-8 h-screen flex flex-col justify-center items-center"
      >
        <div
          class="h-[430px] w-[330px] rounded-lg border-2 border-transparent bg-[#ffffff]"
        >
          <img
            class="bg-cover rounded-lg h-[210px] relative w-[330px]"
            src="./resources/hero-image-1.jpg"
            alt=""
          />
          <img
            class="absolute top-[244px] h-[200px] w-[330px]"
            src="./resources/white-overlay.svg"
            alt=""
          />
          <div class="px-7">
            <h2 class="font-medium tracking-tighter font-[poppins] text-[24px]">
              Perfect solution for small business
            </h2>
            <p class="text-[12px] text-[#4A5567] py-3">
              Small businesses need to generate leads to grow. You can use tools
              like Ringy.
            </p>
            <div class="border-t-2 -mx-7 my-2"></div>
            <div class=" flex py-2 gap-3 items-center justify-start ">
              <div>
                <img
                  class="h-[40px] w-[40px] border-2 rounded-full"
                  src="./resources/avatar-image-business-card-1.png"
                  alt=""
                />
              </div>
              <div class="text-[14px] leading-4">
                <p class="font-semibold">Amy Burgess</p>
                <p class="text-[#4A5567] text-[12px]">Customer Manger, Solution Oy</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
